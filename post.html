<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Post — Sungwoo Cho</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<script>
  // Default theme is light for everyone; OS dark-mode preference is ignored.
  (function () {
    var t = 'light';
    try {
      var saved = localStorage.getItem('theme');
      if (saved === 'dark' || saved === 'light') t = saved;
    } catch (e) {}
    document.documentElement.dataset.theme = t;
  })();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* Theme  */
  :root {
    --ink: #0e0e10;
    --paper: #fdfcf8;
    --muted: rgba(0, 0, 0, 0.6);
    --rule: rgba(0, 0, 0, 0.10);
    --code-bg: rgba(0, 0, 0, 0.06);
    --pre-bg: #f4f1e8;
    --pre-border: rgba(0, 0, 0, 0.08);
    --link: #1a4ea8;
    --selection: rgba(0, 0, 0, 0.12);
    --thumb: rgba(14, 14, 16, 0.10);
    --thumb-hover: rgba(14, 14, 16, 0.3);
  }
  :root[data-theme="dark"] {
    --ink: #e8e6df;
    --paper: #0e0e10;
    --muted: rgba(232, 230, 223, 0.55);
    --rule: rgba(232, 230, 223, 0.16);
    --code-bg: rgba(232, 230, 223, 0.08);
    --pre-bg: #16161a;
    --pre-border: rgba(232, 230, 223, 0.10);
    --link: #8ab4f8;
    --selection: rgba(255, 255, 255, 0.14);
    --thumb: rgba(232, 230, 223, 0.10);
    --thumb-hover: rgba(232, 230, 223, 0.3);
  }

  html, body { margin: 0; padding: 0; }
  body {
    font-family: "Source Serif 4", Georgia, serif;
    font-size: 16px;
    line-height: 1.6;
    color: var(--ink);
    background: var(--paper);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    transition: background 0.25s ease, color 0.25s ease;
  }

  /* paper texture, same as index */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    opacity: 0.025;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
  }

  .wrap {
    position: relative;
    z-index: 1;
    max-width: 680px;
    margin: 0 auto;
    padding: 36px 22px 80px;
  }

  .back {
    display: inline-block;
    margin-bottom: 28px;
    font-size: 0.95em;
    color: inherit;
    text-decoration: underline;
    text-decoration-thickness: 0.5px;
    text-underline-offset: 2px;
    opacity: 0.75;
  }
  .back:hover { opacity: 1; }

  .post-header {
    border-bottom: 1px solid var(--rule);
    padding-bottom: 14px;
    margin-bottom: 28px;
  }

  .post-title {
    font-size: 1.8em;
    font-weight: 500;
    line-height: 1.25;
    margin: 0 0 6px;
    font-style: italic;
  }

  .post-date {
    color: var(--muted);
    font-size: 0.92em;
    font-variant-numeric: tabular-nums;
  }

  article h2 { font-size: 1.25em; margin: 1.6em 0 0.4em; font-weight: 500; }
  article h3 { font-size: 1.08em; margin: 1.4em 0 0.3em; font-weight: 500; }
  article p  { margin: 0.7em 0; }

  article a {
    color: var(--link);
    text-decoration: underline;
    text-decoration-thickness: 0.5px;
    text-underline-offset: 2px;
  }

  article ul, article ol { padding-left: 1.4em; }
  article li { margin: 0.2em 0; }

  article blockquote {
    border-left: 2px solid var(--rule);
    margin: 1em 0;
    padding: 0.1em 0 0.1em 1em;
    color: var(--muted);
    font-style: italic;
  }

  article code {
    font-family: "JetBrains Mono", ui-monospace, monospace;
    font-size: 0.88em;
    background: var(--code-bg);
    padding: 1px 5px;
    border-radius: 3px;
  }

  article pre {
    background: var(--pre-bg);
    border: 1px solid var(--pre-border);
    padding: 12px 14px;
    border-radius: 4px;
    overflow-x: auto;
  }
  article pre code {
    background: none;
    padding: 0;
    font-size: 0.85em;
  }

  article img { max-width: 100%; height: auto; display: block; margin: 1.2em auto; }

  .err {
    color: #b85959;
    font-style: italic;
    text-align: center;
    margin-top: 60px;
  }

  /* Unlock prompt for locked posts — uses theme variables so it works in both modes */
  .unlock-form { text-align: center; margin-top: 30px; }
  .unlock-form .intro {
    font-style: italic;
    color: var(--muted);
    margin-bottom: 14px;
  }
  .unlock-form input[type=password] {
    padding: 7px 10px;
    font-family: inherit;
    font-size: 1em;
    background: var(--paper);
    color: var(--ink);
    border: 1px solid var(--rule);
    border-radius: 3px;
    min-width: 240px;
  }
  .unlock-form button {
    padding: 7px 14px;
    margin-left: 8px;
    font-family: inherit;
    font-size: 0.95em;
    background: var(--paper);
    color: var(--ink);
    border: 1px solid var(--ink);
    border-radius: 3px;
    cursor: pointer;
  }
  .unlock-form .err-line {
    color: #b85959;
    margin-top: 14px;
    min-height: 1.4em;
  }

  ::selection { background: var(--selection); }

  /* Hide scrollbar */
  /* Hide native scrollbars on every scrollable element (page + inner boxes). */
  * { scrollbar-width: none; -ms-overflow-style: none; }
  ::-webkit-scrollbar { display: none; width: 0; height: 0; }

  /* Custom scroll marker — thin floating thumb, auto-hides when idle. */
  #scrollmark {
    position: fixed;
    top: 0;
    right: 8px;
    width: 2px;
    height: 40px;
    background: var(--thumb);
    border-radius: 2px;
    pointer-events: none;
    z-index: 9999;
    opacity: 0;
    transition: opacity 0.5s ease, background 0.25s ease;
  }
  #scrollmark.active {
    opacity: 1;
    transition: opacity 0.12s ease, background 0.25s ease;
  }

  .katex {
  font-size: 1.05em;
  }

  .katex-display {
  overflow-x: auto;
  overflow-y: hidden;
  padding: 0.4em 0;
  }

  /* Custom pen-nib cursor (SVG, hotspot at the tip) — both themes */
  body {
    cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24'><path d='M 2 2 L 18 12 L 12 18 Z' fill='%230e0e10' stroke='%23fdfcf8' stroke-width='0.8' stroke-linejoin='round'/><line x1='4' y1='4' x2='14' y2='14' stroke='%23fdfcf8' stroke-width='0.5' opacity='0.8'/></svg>") 2 2, auto;
  }
  :root[data-theme="dark"] body {
    cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24'><path d='M 2 2 L 18 12 L 12 18 Z' fill='%23e8e6df' stroke='%230e0e10' stroke-width='0.8' stroke-linejoin='round'/><line x1='4' y1='4' x2='14' y2='14' stroke='%230e0e10' stroke-width='0.5' opacity='0.8'/></svg>") 2 2, auto;
  }
  input, textarea, [contenteditable] { cursor: text; }
</style>
<!-- KaTeX -->
<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">

<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
</head>
<body>
  <div id="scrollmark"></div>
  <script>
    (function () {
      var mark = document.getElementById('scrollmark');
      if (!mark) return;
      var minH = 32;
      function update() {
        var docH = document.documentElement.scrollHeight;
        var viewH = window.innerHeight;
        var scrollable = docH - viewH;
        if (scrollable <= 1) { mark.style.display = 'none'; return; }
        mark.style.display = '';
        var h = Math.max(minH, Math.round(viewH * (viewH / docH)));
        var maxTop = viewH - h - 4;
        var top = (window.scrollY / scrollable) * maxTop + 2;
        mark.style.height = h + 'px';
        mark.style.top = top + 'px';
      }
      update();
      window.addEventListener('scroll', update, { passive: true });
      window.addEventListener('resize', update);
    })();
  </script>
  <div class="wrap">
    <a class="back" href="index.html">← back</a>
    <article>
      <header class="post-header">
        <h1 class="post-title" id="title">Loading…</h1>
        <time class="post-date" id="date"></time>
      </header>
      <div id="body"></div>
    </article>
  </div>

  <script src="https://unpkg.com/marked@13.0.3/marked.min.js"></script>
  <script>
    const ITERATIONS = 600000;

    async function decryptBlob(b64, password) {
      const bin = atob(b64);
      const bytes = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
      const salt = bytes.slice(0, 16);
      const iv = bytes.slice(16, 28);
      const ct = bytes.slice(28);

      const baseKey = await crypto.subtle.importKey(
        'raw', new TextEncoder().encode(password),
        { name: 'PBKDF2' }, false, ['deriveKey']
      );
      const key = await crypto.subtle.deriveKey(
        { name: 'PBKDF2', salt, iterations: ITERATIONS, hash: 'SHA-256' },
        baseKey,
        { name: 'AES-GCM', length: 256 },
        false, ['decrypt']
      );
      const pt = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ct);
      return new TextDecoder().decode(pt);
    }

    (function () {
      var params = new URLSearchParams(window.location.search);
      var slug = params.get('slug');
      var locked = params.get('locked') === '1';
      var titleEl = document.getElementById('title');
      var dateEl = document.getElementById('date');
      var bodyEl = document.getElementById('body');

      function fail(msg) {
        titleEl.textContent = 'Post not found';
        dateEl.textContent = '';
        bodyEl.innerHTML = '<p class="err">' + msg + '</p>';
      }

      function renderMarkdown(md) {
        var meta = {};
        var body = md;
        var fm = md.match(/^---\s*\n([\s\S]*?)\n---\s*\n([\s\S]*)$/);
        if (fm) {
          fm[1].split('\n').forEach(function (line) {
            var idx = line.indexOf(':');
            if (idx > 0) {
              var key = line.slice(0, idx).trim();
              var val = line.slice(idx + 1).trim();
              meta[key] = val;
            }
          });
          body = fm[2];
        }
        var title = meta.title || slug;
        titleEl.textContent = title;
        dateEl.textContent = meta.date || '';
        document.title = title + ' — Sungwoo Cho';
        bodyEl.innerHTML = marked.parse(body);

        if (window.renderMathInElement) {
          renderMathInElement(bodyEl, {
            delimiters: [
              { left: "$$", right: "$$", display: true },
              { left: "\\[", right: "\\]", display: true },
              { left: "$", right: "$", display: false },
              { left: "\\(", right: "\\)", display: false }
            ],
            throwOnError: false
          });
        }
      }

      if (!slug) { fail('No post specified.'); return; }
      if (!/^[A-Za-z0-9_\-]+$/.test(slug)) { fail('Invalid post slug.'); return; }

      if (locked) {
        // Encrypted post: show password prompt, fetch .md.enc, decrypt on submit.
        titleEl.textContent = 'Locked post';
        dateEl.textContent = '';
        document.title = 'Locked — Sungwoo Cho';
        bodyEl.innerHTML =
          '<form id="unlock" class="unlock-form">' +
            '<p class="intro">This post is encrypted. Enter the password to read it.</p>' +
            '<input type="password" id="pw" autocomplete="off" autofocus>' +
            '<button type="submit">Unlock</button>' +
            '<p class="err-line" id="unlockErr"></p>' +
          '</form>';

        document.getElementById('unlock').addEventListener('submit', async function (e) {
          e.preventDefault();
          var pw = document.getElementById('pw').value;
          var errEl = document.getElementById('unlockErr');
          errEl.textContent = '';
          if (!pw) { errEl.textContent = 'Enter a password.'; return; }
          try {
            var resp = await fetch('posts/' + slug + '.md.enc');
            if (!resp.ok) throw new Error('not found');
            var b64 = (await resp.text()).trim();
            var md = await decryptBlob(b64, pw);
            renderMarkdown(md);
          } catch (err) {
            errEl.textContent = err.message === 'not found'
              ? "Couldn't find this post."
              : 'Wrong password.';
          }
        });
        return;
      }

      // Plaintext post.
      fetch('posts/' + slug + '.md')
        .then(function (r) {
          if (!r.ok) throw new Error('not found');
          return r.text();
        })
        .then(renderMarkdown)
        .catch(function () { fail("no posty :("); });
    })();
  </script>
</body>
</html>
