<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Post — Sungwoo Cho</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; }
  body {
    font-family: "Source Serif 4", Georgia, serif;
    font-size: 16px;
    line-height: 1.6;
    color: #0e0e10;
    background: #fdfcf8;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  /* paper texture, same as index */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    opacity: 0.025;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
  }

  .wrap {
    position: relative;
    z-index: 1;
    max-width: 680px;
    margin: 0 auto;
    padding: 36px 22px 80px;
  }

  .back {
    display: inline-block;
    margin-bottom: 28px;
    font-size: 0.95em;
    color: inherit;
    text-decoration: underline;
    text-decoration-thickness: 0.5px;
    text-underline-offset: 2px;
    opacity: 0.75;
  }
  .back:hover { opacity: 1; }

  .post-header {
    border-bottom: 1px solid #00000018;
    padding-bottom: 14px;
    margin-bottom: 28px;
  }

  .post-title {
    font-size: 1.8em;
    font-weight: 500;
    line-height: 1.25;
    margin: 0 0 6px;
    font-style: italic;
  }

  .post-date {
    color: #00000099;
    font-size: 0.92em;
    font-variant-numeric: tabular-nums;
  }

  article h2 { font-size: 1.25em; margin: 1.6em 0 0.4em; font-weight: 500; }
  article h3 { font-size: 1.08em; margin: 1.4em 0 0.3em; font-weight: 500; }
  article p  { margin: 0.7em 0; }

  article a {
    color: #1a4ea8;
    text-decoration: underline;
    text-decoration-thickness: 0.5px;
    text-underline-offset: 2px;
  }

  article ul, article ol { padding-left: 1.4em; }
  article li { margin: 0.2em 0; }

  article blockquote {
    border-left: 2px solid #00000022;
    margin: 1em 0;
    padding: 0.1em 0 0.1em 1em;
    color: #00000099;
    font-style: italic;
  }

  article code {
    font-family: "JetBrains Mono", ui-monospace, monospace;
    font-size: 0.88em;
    background: #00000010;
    padding: 1px 5px;
    border-radius: 3px;
  }

  article pre {
    background: #f4f1e8;
    border: 1px solid #00000015;
    padding: 12px 14px;
    border-radius: 4px;
    overflow-x: auto;
  }
  article pre code {
    background: none;
    padding: 0;
    font-size: 0.85em;
  }

  article img { max-width: 100%; height: auto; display: block; margin: 1.2em auto; }

  .err {
    color: #99000099;
    font-style: italic;
    text-align: center;
    margin-top: 60px;
  }

  ::selection { background: #00000020; }
</style>
</head>
<body>
  <div class="wrap">
    <a class="back" href="index.html">← back</a>
    <article>
      <header class="post-header">
        <h1 class="post-title" id="title">Loading…</h1>
        <time class="post-date" id="date"></time>
      </header>
      <div id="body"></div>
    </article>
  </div>

  <script src="https://unpkg.com/marked@13.0.3/marked.min.js"></script>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var slug = params.get('slug');
      var titleEl = document.getElementById('title');
      var dateEl = document.getElementById('date');
      var bodyEl = document.getElementById('body');

      function fail(msg) {
        titleEl.textContent = 'Post not found';
        dateEl.textContent = '';
        bodyEl.innerHTML = '<p class="err">' + msg + '</p>';
      }

      if (!slug) {
        fail('No post specified.');
        return;
      }

      // Disallow path traversal in slug
      if (!/^[A-Za-z0-9_\-]+$/.test(slug)) {
        fail('Invalid post slug.');
        return;
      }

      fetch('posts/' + slug + '.md')
        .then(function (r) {
          if (!r.ok) throw new Error('not found');
          return r.text();
        })
        .then(function (md) {
          // Parse simple front matter: ---\nkey: value\n---\n<body>
          var meta = {};
          var body = md;
          var fm = md.match(/^---\s*\n([\s\S]*?)\n---\s*\n([\s\S]*)$/);
          if (fm) {
            fm[1].split('\n').forEach(function (line) {
              var idx = line.indexOf(':');
              if (idx > 0) {
                var key = line.slice(0, idx).trim();
                var val = line.slice(idx + 1).trim();
                meta[key] = val;
              }
            });
            body = fm[2];
          }

          var title = meta.title || slug;
          titleEl.textContent = title;
          dateEl.textContent = meta.date || '';
          document.title = title + ' — Sungwoo Cho';

          bodyEl.innerHTML = marked.parse(body);
        })
        .catch(function () {
          fail("no posty :(");
        });
    })();
  </script>
</body>
</html>
