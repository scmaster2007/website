<script>
  // Default theme is light for everyone; OS dark-mode preference is ignored.
  (function () {
    var t = 'light';
    try {
      var saved = localStorage.getItem('theme');
      if (saved === 'dark' || saved === 'light') t = saved;
    } catch (e) {}
    document.documentElement.dataset.theme = t;
  })();
</script>

<style>
  /* Theme  */
  :root {
    color-scheme: light;
    --ink: #0e0e10;
    --paper: #fdfcf8;
    --muted: rgba(0, 0, 0, 0.6);
    --rule: rgba(0, 0, 0, 0.10);
    --code-bg: rgba(0, 0, 0, 0.06);
    --pre-bg: #f4f1e8;
    --pre-border: rgba(0, 0, 0, 0.08);
    --link: #1a4ea8;
    --selection: rgba(0, 0, 0, 0.12);
    --thumb: rgba(14, 14, 16, 0.10);
    --thumb-hover: rgba(14, 14, 16, 0.3);
  }
  :root[data-theme="dark"] {
    color-scheme: dark;
    --ink: #e8e6df;
    --paper: #0e0e10;
    --muted: rgba(232, 230, 223, 0.55);
    --rule: rgba(232, 230, 223, 0.16);
    --code-bg: rgba(232, 230, 223, 0.08);
    --pre-bg: #16161a;
    --pre-border: rgba(232, 230, 223, 0.10);
    --link: #8ab4f8;
    --selection: rgba(255, 255, 255, 0.14);
    --thumb: rgba(232, 230, 223, 0.10);
    --thumb-hover: rgba(232, 230, 223, 0.3);
  }

  html, body { margin: 0; padding: 0; }
  body {
    font-family: "Source Serif 4", Georgia, serif;
    font-size: 16px;
    line-height: 1.6;
    color: var(--ink);
    background: var(--paper);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    transition: background 0.25s ease, color 0.25s ease;
  }

  /* paper texture, same as index */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    opacity: 0.025;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
  }

  .wrap {
    position: relative;
    z-index: 1;
    max-width: 680px;
    margin: 0 auto;
    padding: 36px 22px 80px;
  }

  .back {
    display: inline-block;
    margin-bottom: 28px;
    font-size: 0.95em;
    color: inherit;
    text-decoration: underline;
    text-decoration-thickness: 0.5px;
    text-underline-offset: 2px;
    opacity: 0.75;
  }
  .back:hover { opacity: 1; }

  .post-header {
    border-bottom: 1px solid var(--rule);
    padding-bottom: 14px;
    margin-bottom: 28px;
  }

  .post-title {
    font-size: 1.8em;
    font-weight: 500;
    line-height: 1.25;
    margin: 0 0 6px;
    font-style: italic;
  }

  .post-date {
    color: var(--muted);
    font-size: 0.92em;
    font-variant-numeric: tabular-nums;
  }

  article h2 { font-size: 1.25em; margin: 1.6em 0 0.4em; font-weight: 500; }
  article h3 { font-size: 1.08em; margin: 1.4em 0 0.3em; font-weight: 500; }
  article p  { margin: 0.7em 0; }

  article a {
    color: var(--link);
    text-decoration: underline;
    text-decoration-thickness: 0.5px;
    text-underline-offset: 2px;
  }

  article ul, article ol { padding-left: 1.4em; }
  article li { margin: 0.2em 0; }

  article blockquote {
    border-left: 2px solid var(--rule);
    margin: 1em 0;
    padding: 0.1em 0 0.1em 1em;
    color: var(--muted);
    font-style: italic;
  }

  article code {
    font-family: "JetBrains Mono", ui-monospace, monospace;
    font-size: 0.88em;
    background: var(--code-bg);
    padding: 1px 5px;
    border-radius: 3px;
  }

  article pre {
    background: var(--pre-bg);
    border: 1px solid var(--pre-border);
    padding: 12px 14px;
    border-radius: 4px;
    overflow-x: auto;
  }
  article pre code {
    background: none;
    padding: 0;
    font-size: 0.85em;
  }

  article img { max-width: 100%; height: auto; display: block; margin: 1.2em auto; }

  .err {
    color: #b85959;
    font-style: italic;
    text-align: center;
    margin-top: 60px;
  }

  /* Reading progress — thin bar across the very top of the viewport. */
  #readbar {
    position: fixed;
    top: 0; left: 0;
    height: 2px;
    width: 0;
    background: var(--link);
    opacity: 0.7;
    z-index: 9999;
    pointer-events: none;
    transition: background 0.25s ease;
  }

  /* Prev / next post navigation at the bottom of the article. */
  .post-nav {
    display: flex;
    justify-content: space-between;
    gap: 18px;
    margin-top: 48px;
    padding-top: 16px;
    border-top: 1px solid var(--rule);
    font-size: 0.95em;
  }
  .post-nav a {
    color: var(--link);
    font-style: italic;
    text-decoration: underline;
    text-decoration-thickness: 0.5px;
    text-underline-offset: 2px;
  }
  .post-nav .dir {
    display: block;
    font-size: 0.78em;
    font-style: normal;
    color: var(--muted);
    letter-spacing: 0.05em;
    margin-bottom: 2px;
  }
  .post-nav .older { margin-left: auto; text-align: right; }

  /* Unlock prompt for locked posts — uses theme variables so it works in both modes */
  .unlock-form { text-align: center; margin-top: 30px; }
  .unlock-form .intro {
    font-style: italic;
    color: var(--muted);
    margin-bottom: 14px;
  }
  .unlock-form input[type=password] {
    padding: 7px 10px;
    font-family: inherit;
    font-size: 1em;
    background: var(--paper);
    color: var(--ink);
    border: 1px solid var(--rule);
    border-radius: 3px;
    min-width: 240px;
  }
  .unlock-form button {
    padding: 7px 14px;
    margin-left: 8px;
    font-family: inherit;
    font-size: 0.95em;
    background: var(--paper);
    color: var(--ink);
    border: 1px solid var(--ink);
    border-radius: 3px;
    cursor: pointer;
  }
  .unlock-form .err-line {
    color: #b85959;
    margin-top: 14px;
    min-height: 1.4em;
  }

  ::selection { background: var(--selection); }

  /* Hide scrollbar */
  /* Hide native scrollbars on every scrollable element (page + inner boxes). */
  * { scrollbar-width: none; -ms-overflow-style: none; }
  ::-webkit-scrollbar { display: none; width: 0; height: 0; }

  /* Custom scroll marker — thin floating thumb, auto-hides when idle. */
  #scrollmark {
    position: fixed;
    top: 0;
    right: 8px;
    width: 2px;
    height: 40px;
    background: var(--thumb);
    border-radius: 2px;
    pointer-events: none;
    z-index: 9999;
    opacity: 0;
    transition: opacity 0.5s ease, background 0.25s ease;
  }
  #scrollmark.active {
    opacity: 1;
    transition: opacity 0.12s ease, background 0.25s ease;
  }

  /* squircle fall! */
  .physics-side {
    position: fixed;
    top: 0;
    height: 100vh;
    width: 200px;
    pointer-events: none;
    z-index: 0;
  }
  .physics-side.left  { left: 0; }
  .physics-side.right { right: 0; }
  .physics-side canvas { display: block; width: 100%; height: 100%; }

  /* narrowwww view */
  @media (max-width: 1100px) {
    .physics-side { display: none; }
  }

  /* ──────── Music toggle button — inline next to the post title ──────── */
  .post-title-row {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 6px; /* preserves the gap before the date */
  }
  .post-title-row .post-title { flex: 1; margin: 0; }
  #music-btn, #gif-btn {
    flex-shrink: 0;
    width: 32px;
    height: 32px;
    padding: 0;
    border-radius: 50%;
    border: 1px solid var(--rule);
    background: var(--paper);
    color: var(--ink);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0.55;
    transition: opacity 0.25s ease, background 0.25s ease, color 0.25s ease, border-color 0.25s ease;
  }
  #music-btn:hover, #gif-btn:hover { opacity: 0.9; }
  #music-btn.playing { opacity: 1; }
  #music-btn svg, #gif-btn svg { width: 14px; height: 14px; display: block; }
  #music-btn .icon-pause { display: none; }
  #music-btn.playing .icon-play { display: none; }
  #music-btn.playing .icon-pause { display: block; }

  /* GIF toggle: eye = on (gifs visible), eye-slash = off */
  #gif-btn .icon-eye-off { display: none; }
  #gif-btn.off { opacity: 0.4; }
  #gif-btn.off .icon-eye { display: none; }
  #gif-btn.off .icon-eye-off { display: block; }

  /* Asuka dance */
  .side-gif {
    position: fixed;
    bottom: 0;
    width: 180px;
    height: auto;
    pointer-events: none;
    z-index: 1;
  }
  .side-gif.left  { left: 10px; }
  .side-gif.right { right: 10px;
  }
  @media (max-width: 1300px) {
    .side-gif { display: none; }
  }

  .katex {
  font-size: 1.05em;
  }

  .katex-display {
  overflow-x: auto;
  overflow-y: hidden;
  padding: 0.4em 0;
  }

  /* Custom pen-nib cursor (SVG, hotspot at the tip) — both themes */
  body {
    cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24'><path d='M 2 2 L 18 12 L 12 18 Z' fill='%230e0e10' stroke='%23fdfcf8' stroke-width='0.8' stroke-linejoin='round'/><line x1='4' y1='4' x2='14' y2='14' stroke='%23fdfcf8' stroke-width='0.5' opacity='0.8'/></svg>") 2 2, auto;
  }
  :root[data-theme="dark"] body {
    cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24'><path d='M 2 2 L 18 12 L 12 18 Z' fill='%23e8e6df' stroke='%230e0e10' stroke-width='0.8' stroke-linejoin='round'/><line x1='4' y1='4' x2='14' y2='14' stroke='%230e0e10' stroke-width='0.5' opacity='0.8'/></svg>") 2 2, auto;
  }
  input, textarea, [contenteditable] { cursor: text; }
</style>

<body>
  <!-- Physics cascade: small squared circles falling down each sidebar. -->
  <div class="physics-side left"  aria-hidden="true"><canvas></canvas></div>
  <div class="physics-side right" aria-hidden="true"><canvas></canvas></div>

  <!-- Side mascot GIFs. Drop a transparent-bg GIF at uploads/asuka.gif.
       `src` is set by JS from data-gif-src so the toggle (and a saved "off"
       preference) can avoid loading the file at all. -->
  <img class="side-gif left"  data-gif-src="uploads/asuka.gif" alt="" aria-hidden="true" onerror="this.style.display='none'">
  <img class="side-gif right" data-gif-src="uploads/asuka.gif" alt="" aria-hidden="true" onerror="this.style.display='none'">

  <script>
    // Music toggle. The button lives inside the post header (further down in
    // the DOM), so we wait for DOMContentLoaded before wiring it up.
    (function () {
      function init() {
        var btn   = document.getElementById('music-btn');
        var audio = document.getElementById('music-audio');
        if (!btn || !audio) return;
        audio.volume = 0.5;

        btn.addEventListener('click', function () {
          if (audio.paused) {
            audio.play()
              .then(function () { btn.classList.add('playing'); })
              .catch(function (err) {
                console.warn('music play failed:', err);
              });
          } else {
            audio.pause();
            btn.classList.remove('playing');
          }
        });

        audio.addEventListener('ended', function () {
          btn.classList.remove('playing');
        });
      }
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
      } else {
        init();
      }
    })();
  </script>
  <script>
    // GIF toggle. Defaults ON; persists the choice in localStorage('gifs').
    // When off we drop the src entirely so the file isn't fetched.
    (function () {
      function initGifs() {
        var btn  = document.getElementById('gif-btn');
        if (!btn) return;
        var gifs = Array.prototype.slice.call(document.querySelectorAll('.side-gif'));

        var on = true;
        try { on = localStorage.getItem('gifs') !== 'off'; } catch (e) {}

        function apply() {
          btn.classList.toggle('off', !on);
          btn.setAttribute('aria-pressed', String(on));
          gifs.forEach(function (g) {
            if (on) {
              var src = g.getAttribute('data-gif-src') || '';
              if (src && g.getAttribute('src') !== src) g.setAttribute('src', src);
              g.style.display = '';
            } else {
              g.removeAttribute('src'); // stop loading / free bandwidth
              g.style.display = 'none';
            }
          });
        }
        apply();

        btn.addEventListener('click', function () {
          on = !on;
          try { localStorage.setItem('gifs', on ? 'on' : 'off'); } catch (e) {}
          apply();
        });
      }
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initGifs);
      } else {
        initGifs();
      }
    })();
  </script>
  <script>
    // Small physics simulation: spawn squared circles at the top, let gravity
    // pull them down with a slow tumble, remove them when they fall off.
    (function () {
      if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

      function readInk() {
        var v = getComputedStyle(document.documentElement).getPropertyValue('--ink');
        return (v && v.trim()) || '#0e0e10';
      }
      var inkColor = readInk();
      if ('MutationObserver' in window) {
        new MutationObserver(function () { inkColor = readInk(); })
          .observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });
      }

      function drawSquaredCircle(ctx, x, y, size, rot, alpha) {
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(rot);
        ctx.globalAlpha = alpha;
        ctx.strokeStyle = inkColor;
        ctx.fillStyle   = inkColor;
        ctx.lineWidth   = 1;

        var r = size / 2;
        ctx.beginPath();
        ctx.arc(0, 0, r, 0, Math.PI * 2);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, -r * 0.95);
        ctx.lineTo(r * 0.82,  r * 0.475);
        ctx.lineTo(-r * 0.82, r * 0.475);
        ctx.closePath();
        ctx.stroke();
        var sq = r * 0.67;
        ctx.strokeRect(-sq / 2, -sq / 2, sq, sq);
        // inner filled stone
        ctx.beginPath();
        ctx.arc(0, 0, r * 0.20, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();
      }

      function startCanvas(host) {
        var canvas = host.querySelector('canvas');
        if (!canvas) return;
        var ctx = canvas.getContext('2d');
        var items = [];
        var raf = 0;
        var spawnAccumulator = 0;

        var GRAVITY        = 0.06;   // px / frame² acceleration downward
        var SPAWN_PER_SEC  = 1.6;    // average new items per second across all lanes
        var MAX_ITEMS      = 40;     // soft cap (raised for multi-stream)
        var MIN_SIZE       = 12;
        var MAX_SIZE       = 26;
        var BOUNCE_DAMP    = 0.55;   // energy retained per bounce (0 = dead, 1 = elastic)
        var SETTLE_VY      = 0.6;    // |vy| below this on bounce → consider settled
        var SETTLE_HOLD_MS = 700;    // hold settled items briefly before fading
        var FADE_PER_FRAME = 0.012;  // alpha removed per frame after the hold

        var LANE_FRACS = [0.20, 0.50, 0.80];

        function resize() {
          var dpr = window.devicePixelRatio || 1;
          var w = canvas.clientWidth, h = canvas.clientHeight;
          canvas.width  = Math.max(1, Math.floor(w * dpr));
          canvas.height = Math.max(1, Math.floor(h * dpr));
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }

        function spawn() {
          var w = canvas.clientWidth;
          var laneX = LANE_FRACS[Math.floor(Math.random() * LANE_FRACS.length)] * w;
          var size  = MIN_SIZE + Math.random() * (MAX_SIZE - MIN_SIZE);
          return {
            x:    laneX + (Math.random() - 0.5) * 14,   // slight jitter within lane
            y:    -size,
            vy:   Math.random() * 0.4,
            rot:  Math.random() * Math.PI * 2,
            vRot: (Math.random() - 0.5) * 0.035,
            size: size,
            alpha: 0.10 + Math.random() * 0.22,
            settled:    false,
            settleTimer: 0,
          };
        }

        var lastTime = performance.now();
        function frame(now) {
          var dt = Math.min(50, now - lastTime); // clamp on tab-switch
          lastTime = now;
          var dtFrames = dt / (1000 / 60);       // normalize to 60-fps frames

          spawnAccumulator += (SPAWN_PER_SEC * dt) / 1000;
          while (spawnAccumulator >= 1 && items.length < MAX_ITEMS) {
            items.push(spawn());
            spawnAccumulator -= 1;
          }
          if (spawnAccumulator > 1) spawnAccumulator = 1;

          var w = canvas.clientWidth, h = canvas.clientHeight;
          ctx.clearRect(0, 0, w, h);

          for (var i = items.length - 1; i >= 0; i--) {
            var it = items[i];

            if (!it.settled) {
              it.vy  += GRAVITY * dtFrames;
              it.y   += it.vy   * dtFrames;
              it.rot += it.vRot * dtFrames;

              // Bounce off the floor
              var floorY = h - it.size * 0.5;
              if (it.y >= floorY && it.vy > 0) {
                it.y = floorY;
                it.vy = -it.vy * BOUNCE_DAMP;
                it.vRot *= 0.7;             // tumble slows on impact
                if (Math.abs(it.vy) < SETTLE_VY) {
                  it.vy = 0;
                  it.vRot *= 0.2;
                  it.settled = true;
                }
              }
            } else {
              // Settled at the floor — slow rotation to a halt, hold, then fade out.
              it.rot += it.vRot * dtFrames;
              it.vRot *= 0.92;
              it.settleTimer += dt;
              if (it.settleTimer > SETTLE_HOLD_MS) {
                it.alpha -= FADE_PER_FRAME * dtFrames;
                if (it.alpha <= 0) {
                  items.splice(i, 1);
                  continue;
                }
              }
            }

            drawSquaredCircle(ctx, it.x, it.y, it.size, it.rot, it.alpha);
          }

          raf = requestAnimationFrame(frame);
        }

        resize();
        window.addEventListener('resize', resize);
        raf = requestAnimationFrame(frame);
      }

      document.querySelectorAll('.physics-side').forEach(startCanvas);
    })();
  </script>

  <div id="readbar"></div>
  <script>
    // Reading progress bar — fills left→right as you read down the page.
    (function () {
      var bar = document.getElementById('readbar');
      if (!bar) return;
      function update() {
        var docH = document.documentElement.scrollHeight;
        var viewH = window.innerHeight;
        var scrollable = docH - viewH;
        bar.style.width = scrollable > 1
          ? (window.scrollY / scrollable) * 100 + '%'
          : '0';
      }
      update();
      window.addEventListener('scroll', update, { passive: true });
      window.addEventListener('resize', update);
    })();
  </script>

  <div id="scrollmark"></div>
  <script>
    (function () {
      var mark = document.getElementById('scrollmark');
      if (!mark) return;
      var minH = 32;
      function update() {
        var docH = document.documentElement.scrollHeight;
        var viewH = window.innerHeight;
        var scrollable = docH - viewH;
        if (scrollable <= 1) { mark.style.display = 'none'; return; }
        mark.style.display = '';
        var h = Math.max(minH, Math.round(viewH * (viewH / docH)));
        var maxTop = viewH - h - 4;
        var top = (window.scrollY / scrollable) * maxTop + 2;
        mark.style.height = h + 'px';
        mark.style.top = top + 'px';
      }
      update();
      window.addEventListener('scroll', update, { passive: true });
      window.addEventListener('resize', update);
    })();
  </script>

            </svg>
            <svg class="icon-eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M9.9 4.6A10.8 10.8 0 0 1 12 4.4c7 0 10.5 7 10.5 7a18 18 0 0 1-3.4 4.3M6.3 6.3A18 18 0 0 0 1.5 11.4S5 18.4 12 18.4a10.6 10.6 0 0 0 4.1-.8"/>
              <path d="M9.9 9.9a3 3 0 0 0 4.2 4.2"/>
              <line x1="2" y1="2" x2="22" y2="22"/>
            </svg>
          </button>
          <audio id="music-audio" src="uploads/theme.mp3" loop preload="none"></audio>
        </div>
        <time class="post-date" id="date"></time>
      </header>
      <div id="body"></div>
    </article>
  </div>

  <script src="src/arcana.js"></script>
  <script src="src/content.js"></script>
  <script src="https://unpkg.com/marked@13.0.3/marked.min.js"></script>
  <script>
    const ITERATIONS = 600000;

    async function decryptBlob(b64, password) {
      const bin = atob(b64);
      const bytes = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
      const salt = bytes.slice(0, 16);
      const iv = bytes.slice(16, 28);
      const ct = bytes.slice(28);

      const baseKey = await crypto.subtle.importKey(
        'raw', new TextEncoder().encode(password),
        { name: 'PBKDF2' }, false, ['deriveKey']
      );
      const key = await crypto.subtle.deriveKey(
        { name: 'PBKDF2', salt, iterations: ITERATIONS, hash: 'SHA-256' },
        baseKey,
        { name: 'AES-GCM', length: 256 },
        false, ['decrypt']
      );
      const pt = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ct);
      return new TextDecoder().decode(pt);
    }

    (function () {
      var params = new URLSearchParams(window.location.search);
      var slug = params.get('slug');
      var locked = params.get('locked') === '1';
      var titleEl = document.getElementById('title');
      var dateEl = document.getElementById('date');
      var bodyEl = document.getElementById('body');

      function fail(msg) {
        titleEl.textContent = 'Post not found';
        dateEl.textContent = '';
        bodyEl.innerHTML = '<p class="err">' + msg + '</p>';
      }

      function renderMarkdown(md) {
        var meta = {};
        var body = md;
        var fm = md.match(/^---\s*\n([\s\S]*?)\n---\s*\n([\s\S]*)$/);
        if (fm) {
          fm[1].split('\n').forEach(function (line) {
            var idx = line.indexOf(':');
            if (idx > 0) {
              var key = line.slice(0, idx).trim();
              var val = line.slice(idx + 1).trim();
              meta[key] = val;
            }
          });
          body = fm[2];
        }
        var title = meta.title || slug;
        titleEl.textContent = title;
        var words = body.trim() ? body.trim().split(/\s+/).length : 0;
        var mins = Math.max(1, Math.round(words / 220));
        dateEl.textContent = (meta.date || '') +
          (meta.date ? ' · ' : '') + '~' + mins + ' min read';
        document.title = title + ' — Sungwoo Cho';
        bodyEl.innerHTML = marked.parse(body);

        if (window.renderMathInElement) {
          renderMathInElement(bodyEl, {
            delimiters: [
              { left: "$$", right: "$$", display: true },
              { left: "\\[", right: "\\]", display: true },
              { left: "$", right: "$", display: false },
              { left: "\\(", right: "\\)", display: false }
            ],
            throwOnError: false
          });
        }
      }

      if (!slug) { fail('No post specified.'); return; }
      if (!/^[A-Za-z0-9_\-]+$/.test(slug)) { fail('Invalid post slug.'); return; }

      if (locked) {
        // Encrypted post: show password prompt, fetch .md.enc, decrypt on submit.
        titleEl.textContent = 'Locked post';
        dateEl.textContent = '';
        document.title = 'Locked — Sungwoo Cho';
        bodyEl.innerHTML =
          '<form id="unlock" class="unlock-form">' +
            '<p class="intro">This post is encrypted. Enter the password to read it.</p>' +
            '<input type="password" id="pw" autocomplete="off" autofocus>' +
            '<button type="submit">Unlock</button>' +
            '<p class="err-line" id="unlockErr"></p>' +
          '</form>';

        document.getElementById('unlock').addEventListener('submit', async function (e) {
          e.preventDefault();
          var pw = document.getElementById('pw').value;
          var errEl = document.getElementById('unlockErr');
          errEl.textContent = '';
          if (!pw) { errEl.textContent = 'Enter a password.'; return; }
          try {
            var resp = await fetch('posts/' + slug + '.md.enc');
            if (!resp.ok) throw new Error('not found');
            var b64 = (await resp.text()).trim();
            var md = await decryptBlob(b64, pw);
            renderMarkdown(md);
          } catch (err) {
            errEl.textContent = err.message === 'not found'
              ? "Couldn't find this post."
              : 'Wrong password.';
          }
        });
        return;
      }

      // Plaintext post.
      fetch('posts/' + slug + '.md')
        .then(function (r) {
          if (!r.ok) throw new Error('not found');
          return r.text();
        })
        .then(renderMarkdown)
        .catch(function () { fail("no posty :("); });
    })();
  </script>
  <script>
    // Prev / next navigation from CONTENT.blog (newest-first), independent of
    // whether the post body has loaded or decrypted yet.
    (function () {
      var params = new URLSearchParams(window.location.search);
      var slug = params.get('slug');
      var list = (window.CONTENT && window.CONTENT.blog) || [];
      var idx = -1;
      for (var i = 0; i < list.length; i++) {
        if (list[i].slug === slug) { idx = i; break; }
      }
      if (idx === -1) return;
      var newer = idx > 0 ? list[idx - 1] : null;
      var older = idx < list.length - 1 ? list[idx + 1] : null;
      if (!newer && !older) return;

      function makeLink(post, cls, label, prefix, suffix) {
        var div = document.createElement('div');
        div.className = cls;
        var dir = document.createElement('span');
        dir.className = 'dir';
        dir.textContent = label;
        var a = document.createElement('a');
        a.href = 'post.html?slug=' + encodeURIComponent(post.slug) +
          (post.locked ? '&locked=1' : '');
        a.textContent = prefix + post.title + suffix;
        div.appendChild(dir);
        div.appendChild(a);
        return div;
      }

      var nav = document.createElement('nav');
      nav.className = 'post-nav';
      if (newer) nav.appendChild(makeLink(newer, 'newer', 'newer', '← ', ''));
      if (older) nav.appendChild(makeLink(older, 'older', 'older', '', ' →'));
      var article = document.querySelector('article');
      if (article) article.appendChild(nav);
    })();
  </script>
</body>
