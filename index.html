<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sungwoo Cho</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/x-icon" href="favicon.ico"><!-- fallback for older browsers -->
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,400;0,500;0,600;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Crimson+Pro:ital,wght@0,400;0,500;1,400&family=Newsreader:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; overscroll-behavior-y: none; }
  body {
    font-family: "Source Serif 4", Georgia, serif;
    font-size: 15px;
    line-height: 1.5;
    color: #0e0e10;
    background: #fdfcf8;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  a { color: inherit; }
  p { margin: 0.6em 0; }
  ::selection { background: #00000020; }

  /* Subtle paper texture using SVG noise — very faint */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    opacity: 0.025;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
  }
  #root { position: relative; z-index: 1; min-height: 100vh; }

  /* Slim ink-toned scrollbar */
  * { scrollbar-width: thin; scrollbar-color: #0e0e1040 transparent; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb {
    background: #0e0e1040;
    border-radius: 3px;
  }
  ::-webkit-scrollbar-thumb:hover { background: #0e0e1080; }

  /* Custom pen-nib cursor (SVG, hotspot at the tip) */
  body {
    cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24'><path d='M 2 2 L 18 12 L 12 18 Z' fill='%230e0e10' stroke='%23fdfcf8' stroke-width='0.8' stroke-linejoin='round'/><line x1='4' y1='4' x2='14' y2='14' stroke='%23fdfcf8' stroke-width='0.5' opacity='0.8'/></svg>") 2 2, auto;
  }
  input, textarea, [contenteditable] { cursor: text; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="src/content.jsx"></script>
<script type="text/babel" src="src/portrait.jsx"></script>
<script type="text/babel" src="src/section.jsx"></script>
<script type="text/babel" src="src/editable.jsx"></script>
<script type="text/babel" src="src/sections.jsx"></script>
<script type="text/babel" src="src/tweaks.jsx"></script>
<script type="text/babel" src="src/stone.jsx"></script>
<script type="text/babel" src="src/app.jsx"></script>
</body>
</html>
