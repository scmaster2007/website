<script>
  // Apply saved theme BEFORE any CSS paints, to avoid a flash of the wrong colors.
  (function () {
    var t = 'light';
    try {
      var saved = localStorage.getItem('theme');
      if (saved === 'dark' || saved === 'light') t = saved;
      else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) t = 'dark';
    } catch (e) {}
    document.documentElement.dataset.theme = t;
  })();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/x-icon" href="favicon.ico"><!-- fallback for older browsers -->
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,400;0,500;0,600;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Crimson+Pro:ital,wght@0,400;0,500;1,400&family=Newsreader:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* Theme palette — light defaults, dark overrides */
  :root {
    --ink: #0e0e10;
    --paper: #fdfcf8;
    --selection: rgba(0, 0, 0, 0.12);
    --thumb: rgba(14, 14, 16, 0.25);
    --thumb-hover: rgba(14, 14, 16, 0.5);
  }
  :root[data-theme="dark"] {
    --ink: #e8e6df;
    --paper: #0e0e10;
    --selection: rgba(255, 255, 255, 0.14);
    --thumb: rgba(232, 230, 223, 0.22);
    --thumb-hover: rgba(232, 230, 223, 0.45);
  }

  html, body { margin: 0; padding: 0; overscroll-behavior-y: none; }
  body {
    font-family: "Source Serif 4", Georgia, serif;
    font-size: 15px;
    line-height: 1.5;
    color: var(--ink);
    background: var(--paper);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    transition: background 0.25s ease, color 0.25s ease;
  }
  a { color: inherit; }
  p { margin: 0.6em 0; }
  ::selection { background: var(--selection); }

  /* Subtle paper texture using SVG noise — very faint */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    opacity: 0.025;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
  }
  #root { position: relative; z-index: 1; min-height: 100vh; }

  /* Slim scrollbar — adapts to theme */
  * { scrollbar-width: thin; scrollbar-color: var(--thumb) transparent; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--thumb); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--thumb-hover); }

  /* Custom pen-nib cursor (SVG, hotspot at the tip).
     The paper-colored outline keeps it visible in either theme. */
  body {
    cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24'><path d='M 2 2 L 18 12 L 12 18 Z' fill='%230e0e10' stroke='%23fdfcf8' stroke-width='0.8' stroke-linejoin='round'/><line x1='4' y1='4' x2='14' y2='14' stroke='%23fdfcf8' stroke-width='0.5' opacity='0.8'/></svg>") 2 2, auto;
  }
  :root[data-theme="dark"] body {
    cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24'><path d='M 2 2 L 18 12 L 12 18 Z' fill='%23e8e6df' stroke='%230e0e10' stroke-width='0.8' stroke-linejoin='round'/><line x1='4' y1='4' x2='14' y2='14' stroke='%230e0e10' stroke-width='0.5' opacity='0.8'/></svg>") 2 2, auto;
  }
  input, textarea, [contenteditable] { cursor: text; }

  /* Quote flanking images — they have white backgrounds.
     Light mode: multiply blend makes the white blend into the cream paper.
     Dark mode: invert flips white→black (matches page) and icon dark→light. */
  .quote-flank { mix-blend-mode: multiply; transition: filter 0.25s ease; }
  :root[data-theme="dark"] .quote-flank {
    mix-blend-mode: normal;
    filter: invert(1) hue-rotate(180deg);
  }
</style>
</head>
