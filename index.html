<script>
  // Default theme is light for everyone; OS dark-mode preference is ignored.
  (function () {
    var t = 'light';
    try {
      var saved = localStorage.getItem('theme');
      if (saved === 'dark' || saved === 'light') t = saved;
    } catch (e) {}
    document.documentElement.dataset.theme = t;
  })();
</script>

<style>
  /* Theme palette â€” light defaults, dark overrides */
  :root {
    color-scheme: light;
    --ink: #0e0e10;
    --paper: #fdfcf8;
    --selection: rgba(0, 0, 0, 0.12);
    --thumb: rgba(14, 14, 16, 0.10);
    --thumb-hover: rgba(14, 14, 16, 0.3);
  }
  :root[data-theme="dark"] {
    color-scheme: dark;
    --ink: #e8e6df;
    --paper: #0e0e10;
    --selection: rgba(255, 255, 255, 0.14);
    --thumb: rgba(232, 230, 223, 0.10);
    --thumb-hover: rgba(232, 230, 223, 0.3);
  }

  html, body { margin: 0; padding: 0; overscroll-behavior-y: none; }
  body {
    font-family: "Source Serif 4", Georgia, serif;
    font-size: 15px;
    line-height: 1.5;
    color: var(--ink);
    background: var(--paper);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    transition: background 0.25s ease, color 0.25s ease;
  }
  a { color: inherit; }
  p { margin: 0.6em 0; }
  ::selection { background: var(--selection); }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    opacity: 0.025;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
  }
  #root { position: relative; z-index: 1; min-height: 100vh; }

  /* Hide native scrollbars on every scrollable element  */
  * { scrollbar-width: none; -ms-overflow-style: none; }
  ::-webkit-scrollbar { display: none; width: 0; height: 0; }

  /* Custom scroll marker */
  #scrollmark {
    position: fixed;
    top: 0;
    right: 8px;
    width: 2px;
    height: 40px;
    background: var(--thumb);
    border-radius: 2px;
    pointer-events: none;
    z-index: 9999;
    opacity: 0;
    transition: opacity 0.5s ease, background 0.25s ease;
  }
  #scrollmark.active {
    opacity: 1;
    transition: opacity 0.12s ease, background 0.25s ease;
  }

  /* Custom pen-nib cursor (SVG, hotspot at the tip). */
  body {
    cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24'><path d='M 2 2 L 18 12 L 12 18 Z' fill='%230e0e10' stroke='%23fdfcf8' stroke-width='0.8' stroke-linejoin='round'/><line x1='4' y1='4' x2='14' y2='14' stroke='%23fdfcf8' stroke-width='0.5' opacity='0.8'/></svg>") 2 2, auto;
  }
  :root[data-theme="dark"] body {
    cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24'><path d='M 2 2 L 18 12 L 12 18 Z' fill='%23e8e6df' stroke='%230e0e10' stroke-width='0.8' stroke-linejoin='round'/><line x1='4' y1='4' x2='14' y2='14' stroke='%230e0e10' stroke-width='0.5' opacity='0.8'/></svg>") 2 2, auto;
  }
  input, textarea, [contenteditable] { cursor: text; }

  /* Quote flanking images â€” they have white backgrounds.
     Light mode: multiply blend makes the white blend into the cream paper.
     Dark mode: invert flips whiteâ†’black and icon darkâ†’light, then `lighten` */
  .quote-flank { mix-blend-mode: multiply; transition: filter 0.25s ease; }
  :root[data-theme="dark"] .quote-flank {
    mix-blend-mode: lighten;
    filter: invert(1) hue-rotate(180deg);
  }
</style>

<body>
<div id="root"></div>
<div id="scrollmark"></div>
<script>
  // Floating scroll marker â€” driven by scroll position. No native scrollbar.
  (function () {
    var mark = document.getElementById('scrollmark');
    if (!mark) return;
    var minH = 32;
    var hideTimer = null;
    function place() {
      var docH = document.documentElement.scrollHeight;
      var viewH = window.innerHeight;
      var scrollable = docH - viewH;
      if (scrollable <= 1) { mark.style.display = 'none'; return; }
      mark.style.display = '';
      var h = Math.max(minH, Math.round(viewH * (viewH / docH)));
      var maxTop = viewH - h - 4;
      var top = (window.scrollY / scrollable) * maxTop + 2;
      mark.style.height = h + 'px';
      mark.style.top = top + 'px';
    }
    function ping() {
      place();
      mark.classList.add('active');
      clearTimeout(hideTimer);
      hideTimer = setTimeout(function () {
        mark.classList.remove('active');
      }, 900);
    }
    ping(); // brief flash on load so the marker announces itself
    window.addEventListener('scroll', ping, { passive: true });
    window.addEventListener('resize', ping);
    if ('MutationObserver' in window) {
      new MutationObserver(place).observe(document.body, { childList: true, subtree: true });
    }
  })();
</script>
