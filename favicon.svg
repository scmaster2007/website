<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Squared circle">
  <!-- paper background with slight rounded corners -->
  <rect width="64" height="64" rx="6" fill="#fdfcf8"/>
  <!-- the four shapes: circle ▸ triangle ▸ square ▸ inner stone -->
  <g fill="none" stroke="#0e0e10" stroke-linejoin="round">
    <circle cx="32" cy="32" r="28" stroke-width="3"/>
    <polygon points="32,4 56.25,46 7.75,46" stroke-width="2.6"/>
    <rect x="20" y="20" width="24" height="24" stroke-width="2.6"/>
  </g>
  <!-- inner circle filled gold — the "stone" — provides a strong centerpoint at small sizes -->
  <circle cx="32" cy="32" r="8" fill="#c9a24a"/>
</svg>
